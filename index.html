<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="stylesheet/style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="get-images-btn">Get Space Images</button>
    </div>

    <section id="space-fact-container">
      <div class="fact-card">
        <span class="fact-label">Did You Know?</span>
        <p id="fact-text">Loading cosmic intelligence...</p>
      </div>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <img src="https://www.nasa.gov/wp-content/themes/nasa/assets/images/nasa-logo.svg" 
             alt="NASA Logo" 
             class="placeholder-logo">
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div> 
 <div id="imageModal" class="modal">
  <span class="close">&times;</span>
  <div class="modal-content">
    <img id="modalImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="NASA Space Discovery">
    <div id="modalCaption">
      <h2 id="modalTitle"></h2>
      <p id="modalDate"></p>
      <p id="modalDescription"></p>
      
      <button id="close-modal-btn" class="exit-btn">Return to Gallery</button>
    </div>
  </div>
</div>
  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
